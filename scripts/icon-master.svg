<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Icono app "Buenos Aires · Joaquín & Nicole": dos corazones pegados
       sobre el gradiente de marca (amber #fbbf24 -> rosa #fb7185).
       Full-bleed (sin esquinas redondeadas): iOS las redondea solo. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24" />
      <stop offset="1" stop-color="#fb7185" />
    </linearGradient>
  </defs>

  <rect width="180" height="180" fill="url(#g)" />

  <!-- corazón de atrás (izquierda, inclinado hacia afuera) -->
  <g transform="translate(72,84) rotate(-13) scale(1.85)">
    <path transform="translate(-16,-14.8)" fill="#7c2d12" fill-opacity="0.18"
      d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12,16-21.2C32,3.8,28.2,0,23.6,0z" />
  </g>
  <g transform="translate(72,84) rotate(-13) scale(1.7)">
    <path transform="translate(-16,-14.8)" fill="#ffffff"
      d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12,16-21.2C32,3.8,28.2,0,23.6,0z" />
  </g>

  <!-- corazón de adelante (derecha): el borde lo separa del de atrás -->
  <g transform="translate(108,90) rotate(13) scale(1.85)">
    <path transform="translate(-16,-14.8)" fill="#7c2d12" fill-opacity="0.18"
      d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12,16-21.2C32,3.8,28.2,0,23.6,0z" />
  </g>
  <g transform="translate(108,90) rotate(13) scale(1.7)">
    <path transform="translate(-16,-14.8)" fill="#ffffff"
      d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12,16-21.2C32,3.8,28.2,0,23.6,0z" />
  </g>
</svg>
